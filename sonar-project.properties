sonar.host.url=https://sonarcloud.io
sonar.projectKey=ai-agent-assembly_official-website
sonar.organization=ai-agent-assembly

sonar.projectName=official-website
sonar.projectVersion=0.0.0

sonar.projectBaseDir=./
sonar.sources=src
sonar.typescript.tsconfigPaths=tsconfig.json
# Build output, Docusaurus cache, deps, and static assets carry no
# authored source to analyse.
sonar.exclusions=build/**,.docusaurus/**,node_modules/**,static/**
sonar.sourceEncoding=UTF-8

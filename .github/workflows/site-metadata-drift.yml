name: Site metadata drift check

# Re-runs the site-metadata generator and fails if any tracked file changed.
# This is the CI enforcement side of AAASM-4355 / Epic AAASM-4352: the SoT at
# metadata/site-metadata.yaml + scripts/generate-site-metadata.mjs is the only
# place canonical URLs and the served install-script URL may be edited; every
# artifact the generator writes (src/generated/site-urls.ts and the sentinel
# block in static/install.sh) is a generated file and must not be edited by
# hand. See also installer-drift.yml, which enforces a complementary invariant
# on the install.sh executable body.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  drift:
    name: Site metadata drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 22
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Regenerate site-metadata artifacts
        run: pnpm run generate:site-metadata
      - name: Verify no drift
        run: |
          if ! git diff --exit-code -- \
              src/generated/site-urls.ts \
              static/install.sh; then
            echo "::error::site-metadata artifacts are stale — run 'pnpm run generate:site-metadata' and commit the result."
            exit 1
          fi
          echo "OK: site-metadata artifacts are in sync with metadata/site-metadata.yaml."
